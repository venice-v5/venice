name: build

on: [push]

jobs:
  build_wheel:
    name: build-wheel
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup-uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "0.7.3"

      - name: setup-rust-toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-30
          components: rust-src

      - name: setup-rust-cache
        uses: Swatinem/rust-cache@v2

      - name: setup-arm-none-eabi-gcc
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.2.Rel1'

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev

      - name: install-cargo-v5
        run: cargo install --git https://github.com/aadishv/cargo-v5 --branch toolchain --locked cargo-v5

      - name: build-rust
        run: cd packages/venice && cargo v5 toolchain install -y && cargo v5 build


      - name: generate-bin
        run: arm-none-eabi-objcopy -O binary target/armv7a-vex-v5/debug/venice venice/venice.bin

      - name: gzip-bin
        run: gzip -c venice/venice.bin > venice/venice.bin.tmp && mv venice/venice.bin.tmp venice/venice.bin

      - name: build-wheel
        run: cd venice && uv sync && uv build

      - name: upload-bin
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: venice/venice.bin

      - name: upload-wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: venice/dist

name: build

on: [push]

jobs:
  build_wheel:
    name: build-wheel
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "0.7.3"

      - name: setup-rust
        uses: Swatinem/rust-cache@v2

      - name: setup-arm-none-eabi-gcc
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.2.Rel1'

      # begin vibe slopped portion
      # vibe slopped because I want to cache submodules
      # and couldn't care less about how to actually do that
      - name: cache-submodules
        uses: actions/cache@v4
        id: submodule-cache
        with:
          path: .git/modules
          key: submodules-${{ hashFiles('.gitmodules') }}-${{ hashFiles('.git/refs/heads/**', '.git/packed-refs') }}
          restore-keys: |
            submodules-${{ hashFiles('.gitmodules') }}-

      - name: init-submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: restore-submodule-trees-cache
        if: steps.submodule-cache.outputs.cache-hit == 'true'
        run: git submodule update --recursive
      # end vibeslop

      - name: install-cargo-v5
        run: cargo install --git https://github.com/vexide/cargo-v5 --branch toolchain cargo-v5

      - name: build-rust
        run: cargo v5 build

      - name: generate-bin
        run: arm-none-eabi-objcopy -O binary target/armv7a-vex-v5/debug/venice venice/venice.bin

      - name: gzip-bin
        run: gzip -c venice/venice.bin > venice/venice.bin.tmp && mv venice/venice.bin.tmp venice/venice.bin

      - name: build-wheel
        run: cd venice && uv sync && uv build

      - name: upload-bin
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: venice/venice.bin

      - name: upload-wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: venice/dist

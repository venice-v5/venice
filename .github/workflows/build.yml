name: build

on: [push]

jobs:
  build_binary:
    name: build-binary
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup-uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "0.7.3"

      - name: setup-rust-toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-09-30
          components: rust-src

      - name: setup-rust-cache
        uses: Swatinem/rust-cache@v2

      - name: setup-arm-none-eabi-gcc
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.2.Rel1'

      - name: install-cargo-v5
        run: |
          curl -LsSf https://github.com/vexide/cargo-v5/releases/download/v0.12.1/cargo-v5-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: build-rust
        run: cargo v5 build

      - name: generate-bin
        run: arm-none-eabi-objcopy -O binary target/armv7a-vex-v5/debug/venice packages/venice/venice.bin

      - name: gzip-bin
        run: gzip -c packages/venice/venice.bin > packages/venice/venice.bin.tmp && mv packages/venice/venice.bin.tmp packages/venice/venice.bin

      - name: upload-bin
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: packages/venice/venice.bin
